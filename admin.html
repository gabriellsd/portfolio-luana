<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel do Portfólio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }

    /* Painel de edição deslizante */
    #painel-edicao {
      transition: transform 0.25s ease, opacity 0.25s ease;
      transform: translateX(100%);
      opacity: 0;
      pointer-events: none;
    }
    #painel-edicao.aberto {
      transform: translateX(0);
      opacity: 1;
      pointer-events: all;
    }

    /* Botão de seção ativo */
    .btn-secao.ativo {
      background: #1f2937;
      color: #fff;
    }

    /* Color input clean */
    input[type=color] {
      -webkit-appearance: none;
      padding: 0;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
    }
    input[type=color]::-webkit-color-swatch-wrapper { padding: 2px; }
    input[type=color]::-webkit-color-swatch { border: none; border-radius: 5px; }

    /* Range input */
    input[type=range] { accent-color: #1f2937; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ══ TELA DE LOGIN ══════════════════════════════════════════════ -->
  <div id="tela-login" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 w-full max-w-sm p-8">
      <h1 class="text-xl font-semibold text-gray-800 mb-1">Painel do Portfólio</h1>
      <p class="text-sm text-gray-400 mb-6">Faça login para continuar</p>
      <form id="form-login" class="space-y-4">
        <div>
          <label class="text-xs font-medium text-gray-500 block mb-1">E-mail</label>
          <input id="login-email" type="email" required placeholder="seu@email.com"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-gray-400" />
        </div>
        <div>
          <label class="text-xs font-medium text-gray-500 block mb-1">Senha</label>
          <input id="login-senha" type="password" required placeholder="••••••••"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-gray-400" />
        </div>
        <p id="erro-login" class="text-xs text-red-500 hidden"></p>
        <button type="submit"
          class="w-full bg-gray-800 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-gray-700 transition">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <!-- ══ PAINEL (após login) ════════════════════════════════════════ -->
  <div id="painel" class="hidden h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="shrink-0 bg-white border-b border-gray-100 px-5 h-[52px] flex items-center justify-between z-10">
      <span class="text-sm font-semibold text-gray-700">Painel do Portfólio</span>
      <div class="flex items-center gap-4">
        <a href="/" target="_blank" class="text-xs text-gray-400 hover:text-gray-600 transition">Ver site →</a>
        <button id="btn-logout" class="text-xs text-gray-400 hover:text-gray-600 transition">Sair</button>
      </div>
    </header>

    <!-- Barra de seções -->
    <div class="shrink-0 bg-white border-b border-gray-100 px-5 flex items-center gap-1.5 h-[44px] overflow-x-auto">
      <button class="btn-secao text-xs font-medium px-3 py-1.5 rounded-full text-gray-500 hover:bg-gray-100 transition whitespace-nowrap" data-secao="nav">
        Navegação
      </button>
      <!-- Outras seções serão adicionadas depois -->
    </div>

    <!-- Área principal: iframe + painel de edição -->
    <div class="flex-1 flex overflow-hidden relative">

      <!-- iframe do site -->
      <div id="area-iframe" class="flex-1 overflow-hidden transition-all duration-300">
        <iframe id="preview-site" src="/index.html"
          class="w-full h-full border-0"
          title="Preview do site">
        </iframe>
      </div>

      <!-- Painel de edição (slide-in pela direita) -->
      <div id="painel-edicao" class="absolute right-0 top-0 bottom-0 w-[300px] bg-white border-l border-gray-100 shadow-xl overflow-y-auto flex flex-col z-20">
        <!-- Header do painel -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 shrink-0">
          <h2 id="painel-titulo" class="text-sm font-semibold text-gray-800"></h2>
          <button id="fechar-painel" class="text-gray-300 hover:text-gray-500 transition">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- Conteúdo dinâmico dos controles -->
        <div id="painel-conteudo" class="flex-1 overflow-y-auto px-5 py-4 space-y-5"></div>

        <!-- Rodapé: salvar -->
        <div class="shrink-0 px-5 py-4 border-t border-gray-100">
          <button id="btn-salvar"
            class="w-full bg-gray-800 text-white text-sm font-medium py-2.5 rounded-xl hover:bg-gray-700 transition">
            Salvar alterações
          </button>
          <p id="msg-salvar" class="text-xs text-center mt-2 hidden"></p>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
